<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corporate Jargon Translator</title>
  <link rel="stylesheet" href="taskpane.css" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <script src="taskpane.js" type="text/javascript"></script>
</head>
<body>
  <div class="container">
    <h1>Corporate Jargon Translator</h1>
    <p class="subtitle">Turn plain English into elite executive doublespeak</p>

    <div id="settings-panel">
      <div class="field">
        <label for="provider">AI Provider</label>
        <select id="provider">
          <option value="openai">OpenAI &mdash; gpt-4o-mini</option>
          <option value="gemini">Google Gemini &mdash; gemini-2.0-flash</option>
        </select>
      </div>

      <div class="field" id="openai-key-field">
        <label for="openai-key">OpenAI API Key</label>
        <input type="password" id="openai-key" placeholder="sk-..." />
        <small>Stored locally in your browser. Never sent to our servers.</small>
      </div>

      <div class="field hidden" id="gemini-key-field">
        <label for="gemini-key">Gemini API Key</label>
        <input type="password" id="gemini-key" placeholder="AIza..." />
        <small>Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></small>
      </div>

      <div class="field">
        <label for="jargon-level">Jargon Intensity</label>
        <select id="jargon-level">
          <option value="mild">Mild &mdash; "Let's discuss the blockers"</option>
          <option value="medium" selected>Medium &mdash; "Leverage cross-functional alignment"</option>
          <option value="extreme">Extreme &mdash; Full McKinsey word salad</option>
          <option value="unhinged">Unhinged &mdash; Absolutely incomprehensible</option>
        </select>
      </div>

      <div class="field">
        <label for="insert-mode">Insert Mode</label>
        <select id="insert-mode">
          <option value="both" selected>Both &mdash; Original + Corporate Translation</option>
          <option value="corporate">Corporate Only &mdash; Replace with translation</option>
        </select>
        <small>"Both" keeps your original text and adds the translation below it.</small>
      </div>
    </div>

    <div id="preview-panel" class="hidden">
      <div class="preview-box">
        <label>Original</label>
        <div id="original-text" class="preview-text"></div>
      </div>
      <div class="arrow">&darr;</div>
      <div class="preview-box translated">
        <label>Corporate Translation</label>
        <div id="translated-text" class="preview-text"></div>
      </div>
    </div>

    <div class="actions">
      <button id="translate-btn" class="primary">Translate to Corporate</button>
      <button id="insert-btn" class="secondary hidden">Insert into Email</button>
      <button id="copy-btn" class="secondary hidden">Copy to Clipboard</button>
    </div>

    <div id="status" class="hidden"></div>
  </div>
</body>
</html>
